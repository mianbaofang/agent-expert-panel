<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Expert Panel Animation</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter,
          "Segoe UI",
          "PingFang SC",
          "Microsoft YaHei",
          Arial,
          sans-serif;
        color: #172033;
        background: #f4efe5;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 48px 22px 64px;
      }

      h1 {
        margin: 0;
        font-size: 48px;
        line-height: 1.04;
        letter-spacing: 0;
      }

      p {
        max-width: 720px;
        margin: 16px 0 0;
        font-size: 18px;
        line-height: 1.55;
        color: rgba(23, 32, 51, 0.72);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 34px;
      }

      a {
        display: block;
        border: 1px solid rgba(23, 32, 51, 0.12);
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.72);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 18px 44px rgba(23, 32, 51, 0.08);
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }

      strong {
        display: block;
        padding: 18px 18px 4px;
        font-size: 22px;
      }

      span {
        display: block;
        padding: 0 18px 18px;
        color: rgba(23, 32, 51, 0.68);
      }

      @media (max-width: 760px) {
        h1 {
          font-size: 34px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Agent Expert Panel Animation</h1>
      <p>Choose the language version for the project intro animation. 选择项目介绍动画的语言版本。</p>
      <section class="grid">
        <a href="project-intro-animation.en.html">
          <img src="../assets/intro-animation-preview-en.png" alt="English animation preview" />
          <strong>English</strong>
          <span>Open the English intro animation.</span>
        </a>
        <a href="project-intro-animation.zh-CN.html">
          <img src="../assets/intro-animation-preview-zh-CN.png" alt="中文动画预览" />
          <strong>中文版</strong>
          <span>打开中文介绍动画。</span>
        </a>
      </section>
    </main>
  </body>
</html>
